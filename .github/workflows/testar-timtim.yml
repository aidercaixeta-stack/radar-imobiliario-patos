name: Testar coletor TIMTIM

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coletor-timtim
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Executar coleta experimental
        run: python scripts/coletar_timtim.py

      - name: Salvar resultado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/imoveis.json data/meta.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de dados para salvar."
          else
            git commit -m "Atualiza dados reais do TIMTIM"
            git push
          fi
