name: Testar coletor Chaves na Mão

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coletor-chavesnamao
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Executar coleta Chaves na Mão
        id: coleta
        continue-on-error: true
        env:
          CHAVES_MAX_PAGES: "30"
          CHAVES_PAGE_DELAY_SECONDS: "1.5"
        run: python scripts/coletar_chavesnamao.py

      - name: Salvar diagnóstico se existir
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-chavesnamao
          path: debug/chavesnamao/
          if-no-files-found: ignore
          retention-days: 7

      - name: Interromper se a coleta falhou
        if: steps.coleta.outcome != 'success'
        run: |
          echo "A coleta falhou com segurança. A base atual foi preservada."
          exit 2

      - name: Classificar, excluir, deduplicar e consolidar
        run: python scripts/processar_base.py

      - name: Salvar resultado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fontes/chavesnamao.json data/imoveis.json data/meta.json data/excluidos.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de dados para salvar."
          else
            git commit -m "Adiciona e atualiza dados do Chaves na Mão"
            git push
          fi
